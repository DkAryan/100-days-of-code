<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <div class="container">
            <div class="score-board">
                <h2>Score: <span id="score">0</span> / <span id="total">10</span></h2>
            </div>
            <h1 id="question">This is a Question</h1>
           <div class="option">
             <button id="opt1">option 1</button>
            <button id="opt2">option 2</button>
            <button id="opt3">option 3</button>
            <button id="opt4">option 4</button>
           </div>
        </div>
        <div class="controls">
            <button id="start">Start</button>
            <button id="next">Next</button>
        </div>
    </main>
</body>
</html>
