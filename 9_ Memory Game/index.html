<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <h1>Memory Game</h1>
        
        <!-- Game Board jahan saare cards rahenge -->
        <div class="memory-game">
            
            <!-- Card 1 (Aap aise hi total 16 cards banayenge) -->
            <!-- 'data-framework' attribute JS mein match karne ke kaam aayega -->
            <div class="memory-card" data-framework="apple">
                <div class="front-face">🍎</div>
                <div class="back-face">❓</div>
            </div>
            <div class="memory-card" data-framework="apple">
                <div class="front-face">🍎</div>
                <div class="back-face">❓</div>
            </div>

            <!-- Card 2 -->
            <div class="memory-card" data-framework="banana">
                <div class="front-face">🍌</div>
                <div class="back-face">❓</div>
            </div>
            <div class="memory-card" data-framework="banana">
                <div class="front-face">🍌</div>
                <div class="back-face">❓</div>
            </div>

            <!-- Card 3 -->
            <div class="memory-card" data-framework="cherry">
                <div class="front-face">🍒</div>
                <div class="back-face">❓</div>
            </div>
            <div class="memory-card" data-framework="cherry">
                <div class="front-face">🍒</div>
                <div class="back-face">❓</div>
            </div>

            <!-- Card 4 -->
            <div class="memory-card" data-framework="grape">
                <div class="front-face">🍇</div>
                <div class="back-face">❓</div>
            </div>
            <div class="memory-card" data-framework="grape">
                <div class="front-face">🍇</div>
                <div class="back-face">❓</div>
            </div>

            <!-- Card 5 -->
            <div class="memory-card" data-framework="orange">
                <div class="front-face">🍊</div>
                <div class="back-face">❓</div>
            </div>
            <div class="memory-card" data-framework="orange">
                <div class="front-face">🍊</div>
                <div class="back-face">❓</div>
            </div>

            <!-- Card 6 -->
            <div class="memory-card" data-framework="watermelon">
                <div class="front-face">🍉</div>
                <div class="back-face">❓</div>
            </div>

            </div>

                <div class="front-face">🍓</div>
                <div class="back-face">❓</div>
            </div>

            <!-- Card 8 -->
            <div class="memory-card" data-framework="mango">
                <div class="front-face">🥭</div>
                <div class="back-face">❓</div>
            </div>
            <div class="memory-card" data-framework="mango">
                <div class="front-face">🥭</div>
                <div class="back-face">❓</div>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
