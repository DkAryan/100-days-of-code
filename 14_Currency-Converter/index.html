<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="converter-container">
        <h2>Currency Converter</h2>
        
        <div class="input-group">
            <label for="amount">Amount</label>
            <input type="number" id="amount" placeholder="Enter amount" value="1" min="1">
        </div>

        <div class="dropdowns">
            <div class="select-box">
                <label for="from-currency">From</label>
                <select id="from-currency">
                    <option value="USD" selected>USD</option>
                    <option value="INR">INR</option>
                    <option value="EUR">EUR</option>
                    <option value="GBP">GBP</option>
                    <option value="AUD">AUD</option>
                    <!-- Aap JS ke through API se aur options dynamically add kar sakte hain -->
                </select>
            </div>

            <div class="swap-icon" id="swap-btn" title="Swap Currencies">
                &#8644;
            </div>

            <div class="select-box">
                <label for="to-currency">To</label>
                <select id="to-currency">
                    <option value="INR" selected>INR</option>
                    <option value="USD">USD</option>
                    <option value="EUR">EUR</option>
                    <option value="GBP">GBP</option>
                    <option value="AUD">AUD</option>
                </select>
            </div>
        </div>

        <div class="result-box">
            <p id="conversion-result">Getting exchange rate...</p>
        </div>

        <button id="convert-btn">Convert</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
