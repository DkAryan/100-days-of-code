<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dad Joke Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="joke-container">
        <h1>😂 Joke Generator</h1>
        
        <!-- Is paragraph ke andar hume JS se joke daalna hai -->
        <p id="joke-text" class="joke-text">Click the button below to get a funny dad joke!</p>
        
        <!-- Is button par click hone par naya joke aana chahiye -->
        <button id="joke-btn" class="btn">Tell Me A Joke</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
